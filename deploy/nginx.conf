# Avalo — Nginx 反向代理（certbot 會自動補上 443/SSL 區塊）
# 速率限制：一般頁面 10r/s、API 5r/s
limit_req_zone $binary_remote_addr zone=avalo_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=avalo_api:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    server_tokens off;
    client_max_body_size 2m;

    # 安全標頭（HSTS 由 certbot 啟用 HTTPS 後生效才有意義，先行加上）
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 綠界回呼不能被速率限制誤殺，獨立放行
    location /api/ecpay/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=avalo_api burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next 靜態資源長快取
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        limit_req zone=avalo_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
